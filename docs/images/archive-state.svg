<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">已存状态持久化</title>
  <desc id="desc">说明 archivedAt 字段如何让已存按钮在刷新、添加和删除后保持状态。</desc>
  <rect width="920" height="420" rx="24" fill="#f7fbff"/>
  <text x="44" y="56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#202124">为什么「已存」不会再丢失</text>
  <text x="44" y="88" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" fill="#5f6368">归档成功后，状态写入 notes.json，而不是只临时改按钮文字。</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="58" y="132" width="232" height="210" rx="18" fill="#ffef99" stroke="#d8b800" stroke-width="2"/>
    <text x="82" y="170" font-size="18" font-weight="700" fill="#222">桌面便签</text>
    <text x="82" y="205" font-size="15" fill="#333">周六下午 3:00 到 4:30 上课</text>
    <rect x="198" y="286" width="58" height="26" rx="8" fill="#ffffff" stroke="#9b8b34"/>
    <text x="211" y="304" font-size="13" font-weight="700" fill="#333">已存</text>
    <rect x="360" y="132" width="230" height="210" rx="18" fill="#ffffff" stroke="#b9c7d8" stroke-width="2"/>
    <text x="388" y="168" font-size="18" font-weight="700" fill="#222">notes.json</text>
    <text x="386" y="206" font-size="14" fill="#333">{</text>
    <text x="404" y="232" font-size="14" fill="#333">"text": "周六上课",</text>
    <text x="404" y="258" font-size="14" fill="#333">"archivedAt":</text>
    <text x="404" y="284" font-size="14" font-weight="700" fill="#0b7a3b">"2026-05-28T15:30:00"</text>
    <text x="386" y="310" font-size="14" fill="#333">}</text>
    <rect x="660" y="132" width="206" height="210" rx="18" fill="#e6f4ea" stroke="#78a878" stroke-width="2"/>
    <text x="692" y="168" font-size="18" font-weight="700" fill="#222">刷新后读取</text>
    <text x="686" y="211" font-size="15" fill="#333">新增便签</text>
    <text x="686" y="241" font-size="15" fill="#333">删除便签</text>
    <text x="686" y="271" font-size="15" fill="#333">重新打开</text>
    <text x="686" y="306" font-size="15" font-weight="700" fill="#0b7a3b">仍然显示「已存」</text>
    <path d="M302 237 H348" stroke="#567086" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M602 237 H648" stroke="#567086" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#567086"/>
    </marker>
  </defs>
</svg>
